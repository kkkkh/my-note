# Deprecated deployment pipeline.
# The Astro blog is now built and deployed by GitHub Actions:
# .github/workflows/deploy-aliyun.yml
#
# This file is intentionally retained for historical reference and rollback.
# Automatic Drone deployment is disabled by the non-existent branch trigger below.

kind: pipeline
type: docker
name: build-and-run-blog

concurrency:
  limit: 1

volumes:
  - name: dockersock
    host:
      path: /var/run/docker.sock

workspace:
  base: /drone
  path: src/my-note

clone:
  disable: true

steps:
  - name: switch-to-ssh
    image: alpine/git
    environment:
      GIT_SSH_KEY:
        from_secret: DRONE_GIT_SSH_KEY
    commands:
      - mkdir -p ~/.ssh
      - chmod 700 ~/.ssh
      - printf '%s\n' "$GIT_SSH_KEY" | tr -d '\r' > ~/.ssh/id_rsa
      - chmod 600 ~/.ssh/id_rsa
      - ssh-keyscan -H github.com >> ~/.ssh/known_hosts
      - git clone --depth 1 --branch "$DRONE_COMMIT_BRANCH" git@github.com:kkkkh/my-note.git .
      - git -c 'url.git@github.com:.insteadOf=https://github.com/' submodule update --init --recursive
    volumes:
      - name: dockersock
        path: /var/run/docker.sock

  - name: build-and-run-blog
    image: docker:24.0
    volumes:
      - name: dockersock
        path: /var/run/docker.sock
    commands:
      - >-
        docker build
        --build-arg NODE_BASE_IMAGE=m.daocloud.io/docker.io/library/node:22-bookworm-slim
        --build-arg NGINX_BASE_IMAGE=m.daocloud.io/docker.io/library/nginx:mainline-alpine-slim
        --pull=false
        -f apps/blog/Dockerfile
        -t blog:latest
        .
      - docker rm -f blog || true
      - docker run -d -p 9000:80 --name blog --restart=always blog:latest
      - docker image prune -f
    depends_on:
      - switch-to-ssh

# Disabled: no real deployment branch uses this name.
trigger:
  branch:
    - __drone_deployment_disabled__
  event:
    - push
